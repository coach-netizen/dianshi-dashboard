<style>:root{--bg:#0f0f11;--bg2:#16161a;--bg3:#1e1e24;--border:rgba(255,255,255,0.07);--border-bright:rgba(255,255,255,0.15);--text:#f0efe8;--text2:rgba(240,239,232,0.5);--text3:rgba(240,239,232,0.25);--accent:#c8f560;--accent2:#7ec8f5;--danger:#f56060;--warn:#f5b860;--success:#60d49a;--radius:12px;--font:"Noto Sans TC",sans-serif;--mono:"DM Mono",monospace}*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}.shell{display:flex;min-height:100vh}.sidebar{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:28px 0;position:sticky;top:0;height:100vh}.logo{font-size:20px;font-weight:700;letter-spacing:-.5px;padding:0 24px 28px;border-bottom:1px solid var(--border);color:var(--accent)}.logo span{color:var(--text2);font-weight:300}.nav{padding:20px 0;flex:1}.nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent}.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(200,245,96,.05)}.sync-status{padding:16px 24px;font-size:11px;color:var(--text3);border-top:1px solid var(--border)}.sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--success);margin-right:6px;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.main{flex:1;overflow:auto}.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}.page-title{font-size:16px;font-weight:500}.page-sub{font-size:12px;color:var(--text2);margin-top:2px}.topbar-right{display:flex;align-items:center;gap:12px}.month-btn{background:var(--bg3);border:1px solid var(--border-bright);color:var(--text);font-family:var(--font);font-size:13 r(--radius);padding:22px 24px;margin-bottom:20px}.progress-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}.section-label{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}.progress-pct{font-family:var(--mono);font-size:28px;font-weight:500}.bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:8px}.bar-outer{height:12px;background:var(--bg3);border-radius:6px;position:relative;overflow:visible}.bar-inner{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 1s;position:relative}.marker{position:absolute;top:-6px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:2}.marker-line{width:2px;height:24px;border-radius:1px}.marker-label{font-size:9px;font-family:var(--mono);margin-top:4px;white-space:nowrap;padding:2px 5px;border-radius:3px}.marker.breakeven .marker-line{background:var(--danger)}.marker.breakeven .marker-label{background:rgba(245,96,96,.15);color:var(--danger)}.marker.target .marker-line{background:var(--success)}.marker.target .marker-label{background:rgba(96,212,154,.15);color:var(--success)}.legend-strip{display:flex;gap:20px;margin-top:14px}.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.card-title{font-size:13px;font-weight:500}.card-count{font-size:11px;color:var(--text3);font-family:var(--mono)}.table-wrap{overflow-x:auto;max-height:380px;overflow-y:auto}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:10px 16px;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0}td{padding:10px 16px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}tr:last-child td{border-bottom:none}.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;white-space:nowrap}.badge-paid{background:rgba(96,212,154,.12);color:var(--success)}.badge-pending{background:rgba(245,184,96,.12);color:var(--warn)}.amount-cell{font-family:var(--mono);font-size:13px;font-weight:500}.expense-list{max-height:380px;overflow-y:auto}.exp-item{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border)}.exp-item:last-child{border-bottom:none}.exp-name{font-size:13px}.exp-meta{font-size:10px;color:var(--text3);margin-top:2px}.exp-amount{font-family:var(--mono);font-size:13px;color:var(--danger);font-weight:500}.hpa-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}.hpa-header{padding:18px 24px 0;display:flex;justify-content:space-between;align-items:center}.hpa-tabs{display:flex;gap:4px;padding:0 24px;margin:14px 0}.tab-btn{font-size:12px;font-family:var(--font);padding:6px 14px;border-radius:6px;border:1px solid var(--border);color:var(--text2);background:transparent;cursor:pointer}.tab-btn.active{background:var(--accent);color:#0f0f11;font-weight:500;border-color:var(--accent)}.chart-area{padding:0 24px 24px}.chart-wrap-hpa{position:relative;width:100%}.chart-legend{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px}.cl-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}.cl-sq{width:10px;height:3px;border-radius:2px}.dash-footer{padding:20px 32px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);display:flex;justify-content:space-between;font-family:var(--mono)}.state-msg{padding:32px 20px;text-align:center;color:var(--text3);font-size:12px}@media(max-width:900px){.sidebar{display:none}.metric-row{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}.content{padding:20px 16px}.topbar{padding:14px 16px}}</style></head><body>

<script>
var IID="1p_gCyiz7L2lbYMwd7zYmZ82xJME8M5pZwrWwcvS0HMM",IGD="1960929224";
var EID="1hMQZbs6aswN2vsTZo9VXcjwTTBaB2TBoo7FzMfPRU7c",EGD="981478868";
var PID="1kWiVDF1mWZWKNJXwib9EDvX_iMcYGHzb",PGD="866071566";
var TGT=350000,AI=[],AE=[],SM=null,MOS=[],CH=null,HTP="trend";
function fcsv(id,gid){return fetch("https://docs.google.com/spreadsheets/d/"+id+"/export?format=csv&gid="+gid).then(function(r){return r.text();});}
function scsv(line){var cols=[],cur="",inQ=false;for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){inQ=!inQ;}else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}else{cur+=ch;}}cols.push(cur.trim());return cols;}
function camt(s){return parseFloat((s||"").replace(/[$,\s"]/g,""))||0;}
function pdate(s){if(!s)return null;s=s.trim();var m;m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(m)return{y:+m[3],mo:+m[1],d:+m[2]};m=s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);if(m)return{y:+m[1],mo:+m[2],d:+m[3]};m=s.match(/^(\d{1,2})\/(\d{1,2})$/);if(m&&+m[1]>=1&&+m[1]<=12)return{y:new Date().getFullYear(),mo:+m[1],d:+m[2]};return null;}
function mk(d){if(!d)return null;return d.y+"-"+String(d.mo).padStart(2,"0");}
function mlb(k){if(!k)return"";var p=k.split("-");return p[0]+"年"+(+p[1])+"月";}
function pInc(txt){var ls=txt.split("\n"),out=[],hd=scsv(ls[0]);for(var i=1;i<ls.length;i++){var l=ls[i].trim();if(!l)continue;var c=scsv(l),o={};hd.forEach(function(h,j){o[h]=c[j]||"";});var name=o["姓名"]||"";if(!name||name==="姓名")continue;var amt=camt(o["金額"]);if(!amt)continue;var paid=o["確認收到款"]==="已收款";var dt=pdate(o["完款日期"])||pdate(o["應收日期"]);out.push({name:name,proj:o["課程/活動項目"]||"",amt:amt,dt:dt,paid:paid,mk:mk(dt)});}return out;}
function pPnL(txt){var ls=txt.split("\n"),inc=[],exp=[];for(var i=3;i<ls.length;i++){var l=ls[i].trim();if(!l)continue;var c=scsv(l);var ds=c[1]||"",it=c[2]||"",as=c[4]||"";if(!it||!ds||!as)continue;var amt=camt(as);if(amt===0)continue;var dt=pdate(ds);if(!dt)continue;var m=mk(dt);if(amt>0){inc.push({name:it,proj:c[3]||"",amt:amt,dt:dt,paid:true,mk:m});}else{exp.push({d:dt,item:it,amt:Math.abs(amt),mk:m});}}return{inc:inc,exp:exp};}
function pExp(txt){var ls=txt.split("\n"),out=[],hd=scsv(ls[0]);for(var i=1;i<ls.length;i++){var l=ls[i].trim();if(!l)continue;var c=scsv(l),o={};hd.forEach(function(h,j){o[h]=c[j]||"";});var it=o["項目"]||"";if(!it||it==="項目")continue;var amt=camt(o["金額(負數)"]);if(!amt)continue;var dt=pdate(o["紀錄日期"]);out.push({d:dt,item:it,amt:Math.abs(amt),mk:mk(dt)});}return out;}
function mexp(eB,eA){var bk=new Set(eB.map(function(r){return r.mk+"|"+r.item;}));return eB.concat(eA.filter(function(r){return!bk.has(r.mk+"|"+r.item);}));}
function bm(){var k={};AI.forEach(function(r){if(r.mk)k[r.mk]=1;});AE.forEach(function(r){if(r.mk)k[r.mk]=1;});MOS=Object.keys(k).sort();var now=new Date(),cur=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");SM=MOS.indexOf(cur)>=0?cur:(MOS[MOS.length-1]||cur);rb();}
function rb(){document.getElementById("MB").innerHTML=MOS.map(function(k){return'<button class="month-btn'+(k===SM?' active':'')+'" onclick="SEL(\'"+k+"\')">'+mlb(k)+"</button>";}).join("");}
function SEL(k){SM=k;rb();rd();}
function rd(){var inc=AI.filter(function(r){return r.mk===SM;}),exp=AE.filter(function(r){return r.mk===SM;});var rv=inc.filter(function(r){return r.paid;}).reduce(function(s,r){return s+r.amt;},0),tt=exp.reduce(function(s,r){return s+r.amt;},0),pf=rv-tt,mg=rv>0?(pf/rv*100).toFixed(1):0,rt=(rv/TGT*100).toFixed(1);document.getElementById("R0").textContent="$"+rv.toLocaleString();document.getElementById("R1").textContent=inc.filter(function(r){return r.paid;}).length+"筆已收款";document.getElementById("R2").textContent="$"+Math.abs(pf).toLocaleString();document.getElementById("R3").textContent=(pf>=0?"▲":"▼")+" 毛利率 "+mg+"%";document.getElementById("R3").className="metric-change "+(pf>=0?"up":"down");document.getElementById("R4").textContent="$"+tt.toLocaleString();document.getElementById("R5").textContent=exp.length+"筆支出";document.getElementById("R6").textContent=rt+"%";var mx=Math.max(TGT*1.15,rv*1.1||TGT*1.15);document.getElementById("PP").textContent=rt+"%";document.getElementById("BI").style.width=Math.min(rv/mx*100,100)+"%";document.getElementById("MBE").style.left=Math.min(tt/mx*100,98)+"%";document.getElementById("MTR").style.left=Math.min(TGT/mx*100,98)+"%";document.getElementById("BEL").textContent="$"+Math.round(tt/1000)+"k";document.getElementById("TRL").textContent="$"+Math.round(TGT/1000)+"k";document.getElementById("MX").textContent="$"+Math.round(mx/1000)+"k";rInc(inc);rExp(exp);rH(HTP);document.getElementById("ST").textContent="同步於 "+new Date().toLocaleTimeString("zh-TW")+" ・ "+mlb(SM);document.getElementById("FT").textContent=new Date().toLocaleString("zh-TW");}
function rInc(rows){document.getElementById("OC").textContent=rows.length+"筆";var tb=document.getElementById("OB");if(!rows.length){tb.innerHTML="<tr><td colspan=4 class=state-msg>本月無收入資料</td></tr>";return;}var s=rows.slice().sort(function(a,b){return b.paid-a.paid||b.amt-a.amt;});tb.innerHTML=s.map(function(r){var du=r.dt?r.dt.mo+"/"+r.dt.d:"—";var sub=r.proj&&r.proj!==r.name?"<br><small style=color:var(--text2)>"+r.proj+"</small>":"";var badge=r.paid?"badge-paid>✓ 已收款":"badge-pending>⏳ 待收款";return"<tr><td>"+r.name+sub+"</td><td class=amount-cell>$"+r.amt.toLocaleString()+"</td><td style=font-family:var(--mono);font-size:12px>"+du+"</td><td><span class='badge "+badge+"</span></td></tr>";}).join("");}
